name: Generate snake animation

on:
  push:
    branches:
      - master # Triggers on push to master
  pull_request: # Optional: Triggers on pull request events
  workflow_dispatch: # Allows manual triggering

jobs:
  generate: # Job name
    permissions:
      contents: write # Allow writing to the repo
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Generate snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: stashlop 
          outputs: dist/snake.svg?palette=github-dark

      - name: Push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Ensure this token has permissions

